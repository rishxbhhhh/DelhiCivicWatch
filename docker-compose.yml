version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: delhiwatch
      POSTGRES_PASSWORD: delhiwatch
      POSTGRES_DB: delhiwatch
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delhiwatch"]
      interval: 3s
      timeout: 3s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://delhiwatch:delhiwatch@db:5432/delhiwatch
    volumes:
      - uploads:/app/uploads
      - ./data:/app/data:ro
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  pgdata:
  uploads:
