# fly.toml app configuration file generated for delhi-civic-watch on 2026-06-08T21:27:37+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'delhi-civic-watch'
primary_region = 'bom'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_URL = "sqlite:////app/storage/issues.db"
  DATA_DIR = "/app/storage"
  TELEGRAM_BOT_TOKEN = ""     # Set this after creating bot with @BotFather
  APP_URL = "https://delhi-civic-watch.fly.dev"

[[mounts]]
  source = 'dcw_data'
  destination = '/app/storage'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
