events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip
    gzip on;
    gzip_types text/css text/javascript application/javascript image/svg+xml;
    gzip_min_length 256;

    # Limit request rate: 30 req/s per IP
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    server {
        listen 80;
        server_name _;

        # Max upload size (3 images × ~5MB each)
        client_max_body_size 20M;

        # Health check
        location /health {
            return 200 "ok";
        }

        # API → FastAPI
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Uploaded images → FastAPI
        location /uploads/ {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
        }

        # Static frontend files served directly
        location / {
            root /usr/share/nginx/html;
            # If nginx doesn't find it, fall back to app
            try_files $uri @app;
        }

        # Fallback: anything unmatched goes to FastAPI
        location @app {
            proxy_pass http://app:8000;
            proxy_set_header Host $host;
        }
    }
}
